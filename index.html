<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      (function() {
        const handleWebSocketError = (event) => {
          const message = String(event.message || (event.error && event.error.message) || (event.reason && (event.reason.message || event.reason)) || '');
          if (
            message.toLowerCase().includes('websocket') || 
            message.toLowerCase().includes('web socket') ||
            message.toLowerCase().includes('without opened')
          ) {
            event.preventDefault();
            event.stopPropagation();
          }
        };
        window.addEventListener('unhandledrejection', handleWebSocketError, true);
        window.addEventListener('error', handleWebSocketError, true);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
